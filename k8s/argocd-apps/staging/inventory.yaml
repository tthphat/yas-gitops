apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:tthphat/yas-gitops.git
    targetRevision: main
    path: k8s/charts/inventory
    helm:
      valueFiles:
        - values.staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true