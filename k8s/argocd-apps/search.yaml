apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: search
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:tthphat/yas-gitops.git
    targetRevision: main
    path: k8s/charts/search
  destination:
    server: https://kubernetes.default.svc
    namespace: yas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
