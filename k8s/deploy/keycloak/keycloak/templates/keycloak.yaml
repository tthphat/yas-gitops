{{- $externalPort := toString (.Values.externalAccessPort | default "80") -}}
{{- $externalHostname := printf "http://%s" .Values.hostname -}}
{{- if and $externalPort (ne $externalPort "80") -}}
{{- $externalHostname = printf "%s:%s" $externalHostname $externalPort -}}
{{- end -}}
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
spec:
  bootstrapAdmin:
    user:
      secret: keycloak-credentials
  db:
    vendor: postgres
    usernameSecret:
      name: postgresql-credentials
      key: username
    passwordSecret:
      name: postgresql-credentials
      key: password
    host: postgresql.postgres
    database: keycloak
    port: 5432
  http:
    httpEnabled: true
    httpPort: 80
  hostname:
    hostname: {{ $externalHostname | quote }}
    backchannelDynamic: true
    strict: false
  proxy:
    headers: xforwarded
  ingress:
    enabled: true
    className: nginx
  unsupported:
    podTemplate:
      spec:
        volumes:
          - name: yas-themes
            configMap:
              name: yas-themes-configmap
        containers:
          - name: keycloak
            volumeMounts:
              - name: yas-themes
                mountPath: /opt/keycloak/providers
