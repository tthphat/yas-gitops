backend:
  image:
    repository: thaithienphu/media
    tag: v1.0.1

  nameOverride: media
  fullnameOverride: media
  databaseName: media
  extraEnvs:
    - name: SPRING_PROFILES_ACTIVE
      value: k8s
  ingress:
    enabled: true
    host: api.staging.yas.local.com
    path: /media
  extraVolumes:
    - name: media-application
      configMap:
        name: media-application-configmap
  extraVolumeMounts:
    - name: media-application
      mountPath: /opt/yas/media
  extraApplicationConfigPaths:
    - /opt/yas/media/media-application.yaml

