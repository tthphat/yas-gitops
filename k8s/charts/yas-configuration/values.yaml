#Genneral application.yaml for all microservice
applicationConfig:
  server:
    shutdown: graceful
    port: 80

  management:
    otlp:
      tracing:
        endpoint: http://opentelemetry-collector.observability:4318/v1/traces
    server:
      port: 8090
    health:
      readinessstate:
        enabled: true
      livenessstate:
        enabled: true
    tracing:
      sampling:
        probability: 1.0
    metrics:
      tags:
        application: ${spring.application.name}
    endpoints:
      web:
        exposure:
          include: prometheus, health
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always

  logging:
    pattern:
      level: application=${spring.application.name} traceId=%X{traceId:-} spanId=%X{spanId:-} level=%level

  spring:
    lifecycle:
      timeout-per-shutdown-phase: 30s
    security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://identity.yas.local.com/realms/Yas

    datasource:
      url:
      username: ${POSTGRESQL_USERNAME}
      password: ${POSTGRESQL_PASSWORD}
    kafka:
      bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
      consumer:
        bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092
      producer:
        bootstrap-servers: kafka-cluster-kafka-brokers.kafka:9092

  springdoc:
    oauthflow:
      authorization-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
      token-url: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/token

  yas:
    services:
      cart: http://cart/cart
      customer: http://customer/customer
      inventory: http://inventory/inventory
      location: http://location/location
      media: http://media/media
      order: http://order/order
      payment: http://payment/payment
      payment-paypal: http://payment-paypal/payment-paypal
      product: http://product/product
      promotion: http://promotion/promotion
      rating: http://rating/rating
      search: http://search/search
      tax: http://tax/tax
      sampledata: http://sampledata/sampledata
      recommendation: http://recommendation/recommendation

# Gateway config for bff microservices
gatewayRoutesConfig:
  spring:
    cloud:
      gateway:
        server:
          webflux:
            default-filters:
              - SaveSession
            routes:
              - id: product_api
                order: -10
                uri: http://product
                predicates:
                  - Path=/api/product/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: inventory_api
                order: -10
                uri: http://inventory
                predicates:
                  - Path=/api/inventory/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: cart_api
                order: -10
                uri: http://cart
                predicates:
                  - Path=/api/cart/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: customer_api
                order: -10
                uri: http://customer
                predicates:
                  - Path=/api/customer/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: media_api
                order: -10
                uri: http://media
                predicates:
                  - Path=/api/media/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: tax_api
                order: -10
                uri: http://tax
                predicates:
                  - Path=/api/tax/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: search_api
                order: -10
                uri: http://search
                predicates:
                  - Path=/api/search/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: order_api
                order: -10
                uri: http://order
                predicates:
                  - Path=/api/order/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: sampledata_api
                order: -10
                uri: http://sampledata
                predicates:
                  - Path=/api/sampledata/**
                filters:
                  - RewritePath=/api/(?<segment>.*), /$\{segment}
                  - TokenRelay=
              - id: ui
                order: 1000
                uri: ${UI_HOST}
                predicates:
                  - Path=/**

backofficeBffExtraConfig:
  spring:
    data:
      redis:
        host: redis-master.redis
        password: ${REDIS_PASSWORD}
        port: 6379
    security:
      oauth2:
        client:
          provider:
            keycloak:
              authorization-uri: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
              token-uri: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/token
              jwk-set-uri: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/certs
              user-info-uri: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/userinfo
          registration:
            api-client:
              provider: keycloak
              client-id: backoffice-bff
              client-secret: ${KEYCLOAK_BACKOFFICE_BFF_CLIENT_SECRET}
              authorization-grant-type: authorization_code
              client-authentication-method: client_secret_basic
              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
              scope: openid, profile, email, roles

storefrontBffExtraConfig:
  spring:
    data:
      redis:
        host: redis-master.redis
        password: ${REDIS_PASSWORD}
        port: 6379
    security:
      oauth2:
        client:
          provider:
            keycloak:
              authorization-uri: http://identity.yas.local.com/realms/Yas/protocol/openid-connect/auth
              token-uri: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/token
              jwk-set-uri: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/certs
              user-info-uri: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/userinfo
          registration:
            keycloak:
              provider: keycloak
              client-id: storefront-bff
              client-secret: ${KEYCLOAK_STOREFRONT_BFF_CLIENT_SECRET}
              authorization-grant-type: authorization_code
              client-authentication-method: client_secret_basic
              redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
              scope: openid, profile, email, roles
  yas:
    services:
      token-identity: http://keycloak-service.keycloak/realms/Yas/protocol/openid-connect/token

# Media application config custom
mediaApplicationConfig:
  server:
    servlet:
      context-path: /media
  yas:
    publicUrl: http://api.yas.local.com/media

# Customer application config custom
customerApplicationConfig:
  keycloak:
    auth-server-url: http://identity.yas.local.com
    realm: Yas
    resource: customer-management
    credentials:
      secret: ${KEYCLOAK_CUSTOMER_MANAGEMENT_CLIENT_SECRET}

# Search application config custom
searchApplicationConfig:
  elasticsearch:
    url: elasticsearch-es-http.elasticsearch:9200
    username: ${ELASTICSEARCH_USERNAME}
    password: ${ELASTICSEARCH_PASSWORD}

# Payment-paypal application config custom
paymentPaypalApplicationConfig:
  yas:
    public:
      url: http://storefront.yas.local.com/complete-payment

# Recommendation application config custom
recommendationApplicationConfig:
  spring:
    ai:
      azure:
        openai:
          api-key: ${OPENAI_API_KEY}
          endpoint: https://product-recommendation.openai.azure.com
          embedding:
            options:
              model: text-embedding-3-small

sampledataApplicationConfig:
  spring:
    datasource:
      product:
        url: jdbc:postgresql://postgresql.postgres:5432/product
      media:
        url: jdbc:postgresql://postgresql.postgres:5432/media

logbackConfig: |
  <?xml version="1.0" encoding="UTF-8" ?>
  <Configuration>
      <include resource="org/springframework/boot/logging/logback/defaults.xml" />
      <include resource="org/springframework/boot/logging/logback/console-appender.xml" />
      <property name="LOG_LEVEL" value="${LOG_LEVEL:-INFO}"/>
      <root level="INFO">
          <appender-ref ref="CONSOLE" />
      </root>
      <logger name="com.yas" level="${LOG_LEVEL}" additivity="false">
          <appender-ref ref="CONSOLE" />
      </logger>
  </Configuration>

reloader:
  nameOverride: "yas-reloader"
  fullnameOverride: "yas-reloader"
  reloader:
    watchGlobally: false
